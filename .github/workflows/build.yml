name: Build MeloNX IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Clone MeloNX source
        run: |
          git clone https://github.com/VertexSelection/MeloVertex.git MeloNX
          cd MeloNX
          git checkout XC-ios-ht

      - name: Set Xcode CLI tools
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Install .NET 8.0.100
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.100'

      - name: Restore NuGet packages
        run: dotnet restore MeloNX/Ryujinx.sln

      - name: Build with xcodebuild (attempt 1)
        id: build1
        continue-on-error: true
        run: |
          xcodebuild \
            -project MeloNX/src/MeloNX/MeloNX.xcodeproj \
            -scheme MeloNX \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath build

      - name: Build with xcodebuild (attempt 2 - fixes Undefined Symbols)
        run: |
          xcodebuild \
            -project MeloNX/src/MeloNX/MeloNX.xcodeproj \
            -scheme MeloNX \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            -derivedDataPath build

      - name: Package into IPA
        run: |
          APP=$(find build -name "*.app" -not -path "*/simulator/*" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r MeloNX-unsigned.ipa Payload/
          echo "Built: $APP"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-unsigned-ipa
          path: MeloNX-unsigned.ipa
          retention-days: 7
